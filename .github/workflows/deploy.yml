name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/mzain2004/phish-slayer:latest
          build-args: |
           NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
           NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
           SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
           VIRUS_TOTAL_API_KEY=${{ secrets.VIRUS_TOTAL_API_KEY }}
           GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
           NEXT_PUBLIC_SITE_URL=https://phishslayer.tech
           NEXT_PUBLIC_PADDLE_CLIENT_TOKEN=${{ secrets.NEXT_PUBLIC_PADDLE_CLIENT_TOKEN }}
           NEXT_PUBLIC_PADDLE_SOC_PRO_PRICE_ID=${{ secrets.NEXT_PUBLIC_PADDLE_SOC_PRO_PRICE_ID }}
           NEXT_PUBLIC_PADDLE_CC_PRICE_ID=${{ secrets.NEXT_PUBLIC_PADDLE_CC_PRICE_ID }}
           NEXT_PUBLIC_PADDLE_ENV=production

      - name: Deploy to Azure VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 40.123.224.93
          username: mzain2004
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/mzain2004/Phish-Slayer
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u mzain2004 --password-stdin
            docker compose pull
            docker compose down
            docker compose up -d
            docker compose ps
            echo "Deployment complete"