# Required secrets: AGENT_SECRET, WAZUH_WEBHOOK_SECRET,
# CLOUDFLARE_API_TOKEN, CLOUDFLARE_ZONE_ID
name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: "Force Docker rebuild (ignore cache)"
        required: false
        default: "false"

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  pre-deploy-checks:
    name: Pre-Deploy Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      should_deploy: ${{ steps.check.outputs.should_deploy }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Build check
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          VIRUS_TOTAL_API_KEY: ${{ secrets.VIRUS_TOTAL_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          AGENT_SECRET: ${{ secrets.AGENT_SECRET }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_ESCALATION_WEBHOOK_URL }}
          OLLAMA_BASE_URL: http://localhost:11434
          OLLAMA_MODEL: llama3.1:8b
          NEXT_PUBLIC_SITE_URL: https://phishslayer.tech

      - name: Set deploy flag
        id: check
        run: echo "should_deploy=true" >> $GITHUB_OUTPUT

  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: pre-deploy-checks
    if: needs.pre-deploy-checks.outputs.should_deploy == 'true'
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/mzain2004/phish-slayer:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
            VIRUS_TOTAL_API_KEY=${{ secrets.VIRUS_TOTAL_API_KEY }}
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
            AGENT_SECRET=${{ secrets.AGENT_SECRET }}
            CRON_SECRET=${{ secrets.CRON_SECRET }}
            NEXT_PUBLIC_SITE_URL=https://phishslayer.tech
            AZURE_TENANT_ID=${{ secrets.AZURE_TENANT_ID }}
            AZURE_CLIENT_ID=${{ secrets.AZURE_CLIENT_ID }}
            AZURE_CLIENT_SECRET=${{ secrets.AZURE_CLIENT_SECRET }}

  deploy-azure:
    name: Deploy to Azure VM
    runs-on: ubuntu-latest
    needs: build-and-push
    if: needs.build-and-push.result == 'success'
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.AZURE_SSH_PRIVATE_KEY }}

      - name: Write deploy key file
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.AZURE_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Add Azure VM to known hosts
        run: |
          ssh-keyscan -H ${{ secrets.AZURE_VM_IP }} >> ~/.ssh/known_hosts

      - name: Deploy to Azure VM
        run: |
          ssh -i ~/.ssh/deploy_key mzain2004@${{ secrets.AZURE_VM_IP }} << 'ENDSSH'
            set -e
            echo "=== Starting Phish-Slayer deployment ==="
            cd /home/mzain2004/Phish-Slayer

            echo "=== Pulling latest code ==="
            git fetch origin main
            git reset --hard origin/main

            echo "=== Writing environment file ==="
            cat > .env.production << 'ENVEOF'
          NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          VIRUS_TOTAL_API_KEY=${{ secrets.VIRUS_TOTAL_API_KEY }}
          CRON_SECRET=${{ secrets.CRON_SECRET }}
          AGENT_SECRET=${{ secrets.AGENT_SECRET }}
          WAZUH_WEBHOOK_SECRET=${{ secrets.WAZUH_WEBHOOK_SECRET }}
          WAZUH_MANAGER_IP=167.172.85.62
          WAZUH_API_PASSWORD=${{ secrets.WAZUH_API_PASSWORD }}
          DO_SSH_PRIVATE_KEY=${{ secrets.DO_SSH_PRIVATE_KEY }}
          CLOUDFLARE_API_TOKEN=${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID=${{ secrets.CLOUDFLARE_ZONE_ID }}
          DISCORD_ESCALATION_WEBHOOK_URL=${{ secrets.DISCORD_ESCALATION_WEBHOOK_URL }}
          AZURE_TENANT_ID=${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID=${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET=${{ secrets.AZURE_CLIENT_SECRET }}
          OLLAMA_BASE_URL=http://localhost:11434
          OLLAMA_MODEL=llama3.1:8b
          NEXT_PUBLIC_SITE_URL=https://phishslayer.tech
          NEXT_PUBLIC_APP_URL=http://localhost:3000
          INTERNAL_API_URL=http://localhost:3000
          NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_PADDLE_CLIENT_TOKEN=${{ secrets.NEXT_PUBLIC_PADDLE_CLIENT_TOKEN }}
          NEXT_PUBLIC_PADDLE_SOC_PRO_PRICE_ID=${{ secrets.NEXT_PUBLIC_PADDLE_SOC_PRO_PRICE_ID }}
          NEXT_PUBLIC_PADDLE_CC_PRICE_ID=${{ secrets.NEXT_PUBLIC_PADDLE_CC_PRICE_ID }}
          ENVEOF

            echo "=== Pulling latest image from GHCR ==="
            echo "${{ secrets.GITHUB_TOKEN }}" | \
              docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose pull
            docker compose down --remove-orphans
            docker compose up -d --force-recreate

            echo "=== Waiting for app to be ready ==="
            MAX_RETRIES=12
            RETRY=0
            STATUS="000"
            while [ "$STATUS" != "200" ] && [ $RETRY -lt $MAX_RETRIES ]; do
              sleep 10
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
                http://localhost:3000/api/metrics 2>/dev/null)
              [ -z "$STATUS" ] && STATUS="000"
              echo "Health check attempt $((RETRY+1)): $STATUS"
              RETRY=$((RETRY + 1))
            done

            if [ "$STATUS" != "200" ]; then
              echo "App failed to start after $((MAX_RETRIES * 10))s"
              docker compose logs --tail=50
              exit 1
            fi

            echo "=== Deployment successful: $STATUS ==="
            docker compose ps
          ENDSSH

      - name: Notify Discord on success
        if: success()
        run: |
          curl -s -X POST "${{ secrets.DISCORD_ESCALATION_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "embeds": [{
                "title": "✅ Phish-Slayer Deployed Successfully",
                "color": 3329330,
                "fields": [
                  { "name": "Branch", "value": "main", "inline": true },
                  { "name": "Commit", "value": "${{ github.sha }}", "inline": true },
                  { "name": "URL", "value": "https://phishslayer.tech" }
                ],
                "footer": { "text": "Phish-Slayer CI/CD" },
                "timestamp": "'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"
              }]
            }'

      - name: Notify Discord on failure
        if: failure()
        run: |
          curl -s -X POST "${{ secrets.DISCORD_ESCALATION_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "embeds": [{
                "title": "🚨 Phish-Slayer Deployment FAILED",
                "color": 16711680,
                "fields": [
                  { "name": "Branch", "value": "main", "inline": true },
                  { "name": "Commit", "value": "${{ github.sha }}", "inline": true },
                  { "name": "Action", "value": "Check GitHub Actions logs immediately" }
                ],
                "footer": { "text": "Phish-Slayer CI/CD" }
              }]
            }'

  sync-wazuh:
    name: Sync Wazuh Config
    runs-on: ubuntu-latest
    needs: deploy-azure
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DO_SSH_PRIVATE_KEY_RAW }}

      - name: Add DigitalOcean to known hosts
        run: |
          ssh-keyscan -H 167.172.85.62 >> ~/.ssh/known_hosts

      - name: Sync Wazuh webhook config
        run: |
          ssh root@167.172.85.62 << 'ENDSSH'
            set -e
            echo "=== Syncing Wazuh webhook config ==="

            # Ensure integration block points to latest app URL
            CONFIG_FILE="/var/ossec/etc/ossec.conf"

            # Check if custom-webhook integration exists
            if grep -q "custom-webhook" "$CONFIG_FILE"; then
              echo "Webhook integration already configured"
            else
              echo "Adding webhook integration..."
              sed -i 's|</ossec_config>|<integration>\n  <name>custom-webhook</name>\n  <hook_url>https://phishslayer.tech/api/connectors/wazuh</hook_url>\n  <level>7</level>\n  <alert_format>json</alert_format>\n  <api_key>${{ secrets.WAZUH_WEBHOOK_SECRET }}</api_key>\n</integration>\n</ossec_config>|' "$CONFIG_FILE"
              systemctl restart wazuh-manager
              echo "Webhook integration added and Wazuh restarted"
            fi

            # Verify all 3 services are running
            for service in wazuh-manager wazuh-indexer wazuh-dashboard; do
              STATUS=$(systemctl is-active $service)
              echo "$service: $STATUS"
              if [ "$STATUS" != "active" ]; then
                echo "WARNING: $service is not active, attempting restart..."
                systemctl restart $service
                sleep 5
              fi
            done

            echo "=== Wazuh sync complete ==="
          ENDSSH

      - name: Notify Discord on Wazuh sync failure
        if: failure()
        run: |
          curl -s -X POST "${{ secrets.DISCORD_ESCALATION_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "embeds": [{
                "title": "⚠️ Wazuh Config Sync Failed",
                "color": 16744272,
                "fields": [
                  { "name": "Server", "value": "167.172.85.62 (DigitalOcean)", "inline": true },
                  { "name": "Action", "value": "Manual SSH check required" }
                ],
                "footer": { "text": "Phish-Slayer CI/CD" }
              }]
            }'
