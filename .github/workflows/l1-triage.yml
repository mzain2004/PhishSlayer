name: L1 Triage Agent - Hourly

on:
  workflow_dispatch:

jobs:
  run-l1-triage:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Trigger L1 Triage Agent
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.NEXT_PUBLIC_APP_URL }}/api/cron/l1-triage")
          echo "HTTP Status: $RESPONSE"
          if [ "$RESPONSE" != "200" ] && [ "$RESPONSE" != "000" ]; then
            echo "L1 Triage Agent returned non-200: $RESPONSE"
            exit 1
          elif [ "$RESPONSE" = "000" ]; then
            echo "WARNING: Could not reach endpoint (possible startup delay)"
            exit 0
          fi

      - name: Notify Discord on failure
        if: failure()
        run: |
          WEBHOOK="${{ secrets.DISCORD_ESCALATION_WEBHOOK_URL }}"
          if [ -z "$WEBHOOK" ]; then
            echo "Discord webhook not configured, skipping notification"
            exit 0
          fi
          curl -s -X POST "$WEBHOOK" \
            -H "Content-Type: application/json" \
            -d '{
              "embeds": [{
                "title": "🚨 GitHub Actions: L1 Triage Agent FAILED",
                "color": 16711680,
                "fields": [
                  { "name": "Workflow", "value": "l1-triage.yml", "inline": true },
                  { "name": "Schedule", "value": "Every hour", "inline": true },
                  { "name": "Action", "value": "Check /api/cron/l1-triage logs immediately" }
                ],
                "footer": { "text": "Phish-Slayer SOC | GitHub Actions Monitor" },
                "timestamp": "'"$(date -u +%Y-%m-%dT%H:%M:%SZ)"'"
              }]
            }'
