name: Wazuh Server Health Monitor - Every 30 Minutes

on:
  workflow_dispatch:

jobs:
  check-wazuh-health:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger Wazuh Health Check
        run: |
          RESPONSE=$(curl -s -o /tmp/health.json -w "%{http_code}" \
            -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.NEXT_PUBLIC_APP_URL }}/api/infrastructure/wazuh-health")
          echo "HTTP Status: $RESPONSE"
          if [ "$RESPONSE" != "200" ] && [ "$RESPONSE" != "000" ]; then
            echo "Wazuh Health Check returned non-200: $RESPONSE"
            exit 1
          elif [ "$RESPONSE" = "000" ]; then
            echo "WARNING: Could not reach endpoint (possible startup delay)"
            exit 0
          fi
          cat /tmp/health.json
          OVERALL=$(cat /tmp/health.json | python3 -c \
            "import sys,json; d=json.load(sys.stdin); print(d.get('overall','unknown'))" \
            2>/dev/null || echo "unknown")
          echo "Wazuh Health: $OVERALL"
          if [ "$OVERALL" = "down" ]; then
            echo "Wazuh is DOWN - triggering failure"
            exit 1
          fi
          echo "Wazuh status: $OVERALL (acceptable)"

      - name: Notify Discord on failure
        if: failure()
        run: |
          WEBHOOK="${{ secrets.DISCORD_ESCALATION_WEBHOOK_URL }}"
          if [ -z "$WEBHOOK" ]; then
            echo "Discord webhook not configured, skipping notification"
            exit 0
          fi
          curl -s -X POST "$WEBHOOK" \
            -H "Content-Type: application/json" \
            -d '{
              "embeds": [{
                "title": "🚨 Wazuh Server Health Check FAILED",
                "color": 16711680,
                "fields": [
                  { "name": "Server", "value": "167.172.85.62 (DigitalOcean)", "inline": true },
                  { "name": "Action", "value": "Check /api/infrastructure/wazuh-health immediately" }
                ],
                "footer": { "text": "Phish-Slayer SOC | Infrastructure Monitor" }
              }]
            }'
