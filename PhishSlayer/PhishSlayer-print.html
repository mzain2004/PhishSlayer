<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>PhishSlayer — Print</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
<style>
  @page { size: 1440px 1024px; margin: 0; }
  html, body { background: #0B0E14 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; color-adjust: exact; }
  body { margin: 0; }
  .print-page {
    width: 1440px;
    height: 1024px;
    overflow: hidden;
    background: var(--bg-base, #0B0E14);
    page-break-after: always;
    break-after: page;
    position: relative;
    display: flex;
    flex-direction: column;
  }
  .print-page:last-child { page-break-after: auto; break-after: auto; }
  .print-page .body { flex: 1; display: grid; grid-template-columns: 220px 1fr; min-height: 0; overflow: hidden; }
  .print-page .main { overflow: hidden !important; }
  .twk-panel, .twk-fab, .nav-collapse, .shortcut-hint { display: none !important; }
  /* Hide blinking cursors / animations to keep PDF stable */
  .streaming-cursor::after, .pulse { animation: none !important; }
  .flash { animation: none !important; }
  @media screen {
    body { padding: 24px; }
    .print-page { box-shadow: 0 8px 32px rgba(0,0,0,0.6); margin-bottom: 32px; }
  }
  @media print {
    body { padding: 0; }
    .print-page { box-shadow: none; margin: 0; }
  }
  .print-cover {
    background: var(--bg-base, #0B0E14);
    color: #E2E8F0;
    width: 1440px; height: 1024px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    page-break-after: always; break-after: page;
    font-family: 'Space Grotesk', sans-serif;
    position: relative;
  }
  .print-cover::before {
    content: ''; position: absolute; inset: 0;
    background:
      radial-gradient(circle at 20% 20%, rgba(99,102,241,0.18), transparent 40%),
      radial-gradient(circle at 80% 80%, rgba(139,92,246,0.14), transparent 45%);
    pointer-events: none;
  }
  .print-cover .logo-block {
    width: 88px; height: 88px; border-radius: 20px;
    background: linear-gradient(135deg, #6366F1, #8B5CF6);
    display: flex; align-items: center; justify-content: center; color: white;
    margin-bottom: 32px;
    box-shadow: 0 12px 40px rgba(99,102,241,0.4);
    position: relative;
  }
  .print-cover h1 {
    font-size: 88px; font-weight: 700; letter-spacing: -0.04em;
    margin: 0; color: #F8FAFC; position: relative;
  }
  .print-cover .tagline {
    font-size: 22px; color: #94A3B8; margin-top: 12px; font-weight: 400;
    font-family: 'Inter', sans-serif; position: relative;
  }
  .print-cover .meta {
    margin-top: 64px; display: flex; gap: 48px; font-family: 'JetBrains Mono', monospace;
    font-size: 12px; color: #64748B; position: relative;
  }
  .print-cover .meta b { color: #CBD5E1; font-weight: 500; }
  .print-cover .ver {
    position: absolute; bottom: 32px; left: 0; right: 0; text-align: center;
    font-family: 'JetBrains Mono', monospace; font-size: 11px; color: #475569;
    letter-spacing: 0.2em;
  }
  .screen-label {
    position: absolute; top: 16px; right: 24px;
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    color: #475569; letter-spacing: 0.2em; z-index: 10;
    background: rgba(11,14,20,0.7); padding: 4px 10px; border-radius: 4px;
    border: 1px solid rgba(99,102,241,0.2);
  }
</style>
</head>
<body data-accent="indigo" data-animation="off">
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="detail-panel.jsx"></script>
<script type="text/babel" src="screens.jsx"></script>

<script type="text/babel">
const NAV_SECTIONS = [
  { label: 'Operations', items: [
    { id: 'alerts',   name: 'Alerts',   icon: IShield },
    { id: 'hunt',     name: 'Hunting',  icon: ICrosshair },
  ]},
  { label: 'Intelligence', items: [
    { id: 'iocs',     name: 'IOCs',     icon: IFingerprint },
    { id: 'reports',  name: 'Reports',  icon: IFile },
  ]},
  { label: 'Platform', items: [
    { id: 'agents',    name: 'Agents',    icon: ICpu },
    { id: 'evolution', name: 'Evolution', icon: IDna },
    { id: 'metrics',   name: 'Metrics',   icon: IChart },
  ]},
  { label: 'Settings', items: [
    { id: 'settings', name: 'Settings', icon: ISettings },
  ]},
];

function Topbar() {
  return (
    <header className="topbar">
      <div className="brand">
        <div className="logo">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path d="M12 2 L20 5 V12 C20 17 16 21 12 22 C8 21 4 17 4 12 V5 Z" stroke="currentColor" strokeWidth="2" strokeLinejoin="round" />
            <path d="M9 12 L11 14 L15 10" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
          </svg>
        </div>
        <span className="name">PhishSlayer</span>
        <span className="ver">v0.6.2</span>
      </div>
      <div className="topbar-mid">
        <button className="org-picker">
          <span className="org-dot" />
          <span className="org-name">Contoso Industries</span>
          <span className="org-tag">prod</span>
          <IChevDown size={11} />
        </button>
      </div>
      <div className="topbar-right">
        <button className="cmd-k">
          <ISearch size={12} />
          <span>Quick search</span>
          <kbd>⌘K</kbd>
        </button>
        <span className="tier-badge tier-cmd-center">CMD CENTER</span>
        <button className="icon-btn"><IBell size={15} /><span className="dot-red" /></button>
        <div className="avatar">JR</div>
      </div>
    </header>
  );
}

function Sidenav({ active }) {
  return (
    <nav className="sidenav">
      {NAV_SECTIONS.map(section => (
        <div key={section.label} className="nav-section">
          <div className="nav-section-label">{section.label}</div>
          {section.items.map(item => {
            const Ico = item.icon;
            const isActive = item.id === active;
            const badge = item.id === 'alerts' ? 4 : item.id === 'evolution' ? 3 : null;
            return (
              <button key={item.id} className={`nav-item ${isActive ? 'active' : ''}`}>
                <span className="ico"><Ico size={15} /></span>
                <span className="label">{item.name}</span>
                {badge > 0 && <span className="nav-badge">{badge}</span>}
              </button>
            );
          })}
        </div>
      ))}
    </nav>
  );
}

function PrintShell({ active, label, children }) {
  return (
    <div className="print-page shell" data-density="comfortable">
      <span className="screen-label">{label}</span>
      <Topbar />
      <div className="body">
        <Sidenav active={active} />
        <main className="main">{children}</main>
      </div>
    </div>
  );
}

function Cover() {
  return (
    <div className="print-cover">
      <div className="logo-block">
        <svg width="44" height="44" viewBox="0 0 24 24" fill="none">
          <path d="M12 2 L20 5 V12 C20 17 16 21 12 22 C8 21 4 17 4 12 V5 Z" stroke="currentColor" strokeWidth="2" strokeLinejoin="round" />
          <path d="M9 12 L11 14 L15 10" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
        </svg>
      </div>
      <h1>PhishSlayer</h1>
      <div className="tagline">SOC Console — UI/UX/AX Blueprint v1.0</div>
      <div className="meta">
        <div><b>FORMAT</b> Interactive prototype</div>
        <div><b>SCREENS</b> 6</div>
        <div><b>DATE</b> May 2026</div>
      </div>
      <div className="ver">CONTOSO INDUSTRIES · CONFIDENTIAL</div>
    </div>
  );
}

function PrintApp() {
  // Force a fixed flashed-set so visuals are stable
  const flashed = new Set();
  return (
    <>
      <Cover />
      <PrintShell active="alerts" label="01 · ALERTS">
        <AlertQueueScreen
          alerts={SEED_ALERTS}
          selectedId={null}
          onSelect={() => {}}
          density="comfortable"
          showResolved={true}
          recentlyFlashed={flashed}
        />
      </PrintShell>
      <PrintShell active="alerts" label="02 · ALERT DETAIL">
        <AlertQueueScreen
          alerts={SEED_ALERTS}
          selectedId={SEED_ALERTS[0].id}
          onSelect={() => {}}
          density="comfortable"
          showResolved={false}
          recentlyFlashed={flashed}
        />
        <DetailPanel alert={SEED_ALERTS[0]} open={true} onClose={() => {}} onApprove={() => {}} onReject={() => {}} onOpenHunt={() => {}} printMode={true} />
      </PrintShell>
      <PrintShell active="hunt" label="03 · HUNT VIEW">
        <HuntScreen onBack={() => {}} printMode={true} />
      </PrintShell>
      <PrintShell active="metrics" label="04 · METRICS">
        <MetricsScreen />
      </PrintShell>
      <PrintShell active="evolution" label="05 · EVOLUTION">
        <EvolutionScreen />
      </PrintShell>
      <PrintShell active="settings" label="06 · SETTINGS">
        <SettingsScreen />
      </PrintShell>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<PrintApp />);

// Auto-print after fonts + Babel load
(async () => {
  try { if (document.fonts && document.fonts.ready) await document.fonts.ready; } catch (e) {}
  // Wait for React + Babel to render the screens
  await new Promise(r => setTimeout(r, 1500));
  window.print();
})();
</script>
</body>
</html>
