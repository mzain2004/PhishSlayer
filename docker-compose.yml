services:
  nextjs:
    image: ghcr.io/mzain2004/phish-slayer:latest
    ports:
      - "3000:3000"
    env_file: .env.production
    restart: unless-stopped
    networks: [app-network]
    depends_on: [redis]

  api:
    image: ghcr.io/mzain2004/phish-slayer-api:latest
    ports:
      - "8000:8000"
    env_file: .env.production
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - MCP_GATEWAY_URL=http://mcp-gateway:9000
    restart: unless-stopped
    networks: [app-network]
    depends_on: [redis, mcp-gateway]

  redis:
    image: redis:7-alpine
    command:
      [
        "redis-server",
        "--requirepass",
        "${REDIS_PASSWORD}",
        "--appendonly",
        "yes",
      ]
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks: [app-network]

  mcp-gateway:
    image: python:3.11-slim
    container_name: phish-slayer-mcp-gateway
    working_dir: /app
    ports:
      - "127.0.0.1:9000:9000"
    env_file: .env.production
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - CREDENTIAL_ENCRYPTION_KEY=${CREDENTIAL_ENCRYPTION_KEY}
      - DEFAULT_VT_API_KEY=${VIRUS_TOTAL_API_KEY}
      - DEFAULT_SHODAN_API_KEY=${SHODAN_API_KEY}
      - DEFAULT_GREYNOISE_API_KEY=${GREYNOISE_API_KEY}
      - DEFAULT_HIBP_API_KEY=${HIBP_API_KEY}
      - DEFAULT_HUNTER_API_KEY=${HUNTER_API_KEY}
      - DEFAULT_ABUSEIPDB_API_KEY=${ABUSEIPDB_API_KEY}
      - DEFAULT_OTX_API_KEY=${OTX_API_KEY}
      - DEFAULT_URLSCAN_API_KEY=${URLSCAN_API_KEY}
      - DEFAULT_CENSYS_API_KEY=${CENSYS_API_KEY}
      - DEFAULT_MISP_URL=${MISP_URL}
      - DEFAULT_MISP_KEY=${MISP_API_KEY}
      - DEFAULT_OPENCTI_URL=${OPENCTI_URL}
      - DEFAULT_OPENCTI_KEY=${OPENCTI_API_KEY}
    volumes:
      - ./mcp-gateway:/app
    command: >
      sh -c "pip install -q -r /app/requirements.txt &&
             python /app/main.py"
    networks:
      - app-network
    restart: unless-stopped
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  mcp-osint:
    build:
      context: .
      dockerfile: mcp-servers/osint/Dockerfile
    ports:
      - "127.0.0.1:9001:9001"
    env_file: .env.production
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
    restart: unless-stopped
    networks: [app-network]
    depends_on: [redis, api]

  mcp-wazuh:
    build:
      context: .
      dockerfile: mcp-servers/wazuh/Dockerfile
    ports:
      - "127.0.0.1:9002:9002"
    env_file: .env.production
    restart: unless-stopped
    networks: [app-network]
    depends_on: [api]

  mcp-graph:
    build:
      context: .
      dockerfile: mcp-servers/graph/Dockerfile
    ports:
      - "127.0.0.1:9003:9003"
    env_file: .env.production
    restart: unless-stopped
    networks: [app-network]
    depends_on: [api]

volumes:
  redis_data:

networks:
  app-network:
    driver: bridge
