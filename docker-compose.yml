services:
  nextjs:
    image: ghcr.io/mzain2004/phish-slayer:latest
    ports:
      - "3000:3000"
    env_file: .env.production
    restart: unless-stopped
    networks: [app-network]
    depends_on: [redis]

  api:
    image: ghcr.io/mzain2004/phish-slayer-api:latest
    ports:
      - "8000:8000"
    env_file: .env.production
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
    restart: unless-stopped
    networks: [app-network]
    depends_on: [redis]

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--appendonly", "yes"]
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks: [app-network]

  mcp-osint:
    build:
      context: .
      dockerfile: mcp-servers/osint/Dockerfile
    ports:
      - "127.0.0.1:9001:9001"
    env_file: .env.production
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
    restart: unless-stopped
    networks: [app-network]
    depends_on: [redis, api]

  mcp-wazuh:
    build:
      context: .
      dockerfile: mcp-servers/wazuh/Dockerfile
    ports:
      - "127.0.0.1:9002:9002"
    env_file: .env.production
    restart: unless-stopped
    networks: [app-network]
    depends_on: [api]

  mcp-graph:
    build:
      context: .
      dockerfile: mcp-servers/graph/Dockerfile
    ports:
      - "127.0.0.1:9003:9003"
    env_file: .env.production
    restart: unless-stopped
    networks: [app-network]
    depends_on: [api]

volumes:
  redis_data:

networks:
  app-network:
    driver: bridge
