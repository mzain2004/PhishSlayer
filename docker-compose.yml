services:
  phish-slayer:
    image: ghcr.io/mzain2004/phish-slayer:latest
    ports:
      - "80:3000"
    restart: always
    env_file:
      - .env.production

  cron-runner:
    image: node:20-alpine
    working_dir: /app
    restart: always
    env_file:
      - .env.production
    environment:
      - CRON_BASE_URL=http://phish-slayer:3000
      - CRON_ENV_FILE=.env.production
    volumes:
      - ./:/app
    depends_on:
      - phish-slayer
    command:
      [
        "sh",
        "-c",
        "chmod +x ./scripts/start-cron.sh && ./scripts/start-cron.sh",
      ]
